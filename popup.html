<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h2>Tab Group Exporter</h2>
    <p class="subtitle">Export links to Markdown</p>
    
    <label for="groupSelect">Select Tab Group:</label>
    <select id="groupSelect"></select>
    
    <div class="options">
      <label><input type="radio" name="exportMethod" id="radioCopy" value="copy" checked> Copy to Clipboard</label>
      <label><input type="radio" name="exportMethod" id="radioDownload" value="download"> Download .md File</label>
      <label><input type="radio" name="exportMethod" id="radioBoth" value="both"> Both</label>
    </div>
    <details id="syncSection">
      <summary>Sync & Diff against existing .md</summary>
      <div class="sync-container">
        <label for="mdUpload" class="upload-label">Upload previous .md backup:</label>
        <input type="file" id="mdUpload" accept=".md">
        <div id="diffResults"></div>
        <label id="lblOverride" style="display:none;"><input type="checkbox" id="chkOverride" checked> Overwrite existing file</label>
        <button id="syncBtn" style="display:none;">Sync & Export Updates</button>
      </div>
    </details>
    
    <button id="exportBtn">Export Markdown</button>
    <div id="statusBox"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
